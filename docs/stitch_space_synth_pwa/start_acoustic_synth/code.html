<button class="text-outline hover:brightness-110 transition-all active:translate-y-0.5"><span class="material-symbols-outlined" data-icon="signal_cellular_alt">signal_cellular_alt</span></button>

<!-- Main Content Area -->

<!-- Central Graphic Module -->

<!-- Mechanical Frame -->

<div class="absolute top-4 right-4 rivet"></div>

<div class="absolute bottom-4 right-4 rivet"></div>

<img alt="Central UI Controller" class="w-full h-full object-cover opacity-60 mix-blend-luminosity" data-alt="A highly detailed 3D digital illustration of a steampunk-inspired hands-free controller interface. The central mechanism features a complex array of polished brass gears, glass vacuum tubes glowing with warm amber filaments, and etched mahogany panels. The lighting is low-key and dramatic, casting long shadows and highlighting the metallic sheen of the brass components. The overall aesthetic is one of artisanal engineering and precision, using a palette of deep browns, rich golds, and warm oranges without any modern digital blues or purples." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6nLS6M3Sk9Yn2TocYKS6qb2WxkZhstTjeNsHoo4BVEXDA9E8wh6-F2cXl1tMJPgBxEq-k5GtowWWstHa4f2dFQwdDL26tFzBcohzimRR2r8MohKkjjCGELBWqIBf7sUYxX7OAoj9O_mI13IgyPafHDwqgUZU7zP7kgjFb67GJf7i7sl-b18DzBi-0mB9NttaxOpSwTJv8raS6VNm_JH8hsODRgJvmMFEe5YInD64DpXCLLuDLGtORgKu3bZOYp88iFK4hcfRibgY"/>

<!-- Interactive Script for Atmospheric Effects -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            // Subtle movement for the central module
            const module = document.querySelector('.glass-module');
            const moveX = (x - 0.5) * 20;
            const moveY = (y - 0.5) * 20;
            module.style.transform = `perspective(1000px) rotateY(${moveX}deg) rotateX(${-moveY}deg)`;
        });

        // Simulating vacuum tube flicker
        const amberGlows = document.querySelectorAll('.amber-glow-text');
        setInterval(() => {
            amberGlows.forEach(el => {
                const flicker = 0.8 + Math.random() * 0.4;
                el.style.opacity = flicker;
            });
        }, 150);
    </script>
